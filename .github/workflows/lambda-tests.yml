name: Lambda Unit Tests

on:
  pull_request:
    paths:
      - "lambda/**"
      - ".github/workflows/lambda-tests.yml"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r lambda/tests/requirements-dev.txt

      - name: Run tests
        run: pytest lambda/tests/ -v
