name: Terraform CI (fmt, validate, plan)

# Runs on every pull request that touches terraform/ or lambda/.
# Does NOT apply anything — read-only checks + a plan you review before merge.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "terraform/**"
      - "lambda/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  id-token: write   # required for OIDC auth to AWS
  contents: read
  pull-requests: write # required to comment the plan on the PR

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  fmt-check:
    name: Terraform fmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive terraform/

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: fmt-check
    strategy:
      matrix:
        environment: [dev, prod]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -no-color -out=tfplan.binary

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/tfplan.binary
          retention-days: 5
